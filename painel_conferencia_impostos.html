<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conferência de Impostos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --border:#E4E2DC;
  --text:#1A1915;
  --muted:#888780;
  --accent:#1A1915;
  --green-bg:#EAF3DE;--green-text:#27500A;--green-border:#97C459;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#EF9F27;
  --red-bg:#FCEBEB;--red-text:#791F1F;--red-border:#F09595;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-border:#AFA9EC;
  --teal-bg:#E1F5EE;--teal-text:#085041;--teal-border:#5DCAA5;
  --coral-bg:#FAECE7;--coral-text:#712B13;--coral-border:#F0997B;
  --pink-bg:#FBEAF0;--pink-text:#72243E;--pink-border:#ED93B1;
  --radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.container{max-width:960px;margin:0 auto;padding:2rem 1.25rem}
header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:var(--text);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.logo-text h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.logo-text p{font-size:12px;color:var(--muted);margin-top:1px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .15s;font-weight:500}
.btn:hover{background:var(--bg);border-color:#ccc}
.btn-dark{background:var(--text);color:#fff;border-color:var(--text)}
.btn-dark:hover{opacity:.85;background:var(--text)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:1.5rem}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.sum-num{font-size:26px;font-weight:600;letter-spacing:-1px;color:var(--text)}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.sum-num.green{color:#27500A}.sum-num.amber{color:#633806}.sum-num.red{color:#791F1F}.sum-num.muted{color:var(--muted)}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);cursor:pointer;color:var(--muted);background:transparent;transition:all .15s;font-weight:500}
.tab:hover{border-color:#999;color:var(--text)}
.tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.filters{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
.filters select,.filters input{font-family:'DM Sans',sans-serif;font-size:13px;padding:7px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);outline:none}
.filters select:focus,.filters input:focus{border-color:#999}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#ccc}
.card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:10px}
.card-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.card-info{}
.card-name{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500;display:inline-block}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-gray{background:#F1EFE8;color:var(--muted)}
.prog-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.prog-bar{width:72px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-lbl{font-size:12px;color:var(--muted);min-width:30px;text-align:right;font-family:'DM Mono',monospace}
.chevron{font-size:16px;color:var(--muted);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
.card-body{border-top:1px solid var(--border);padding:16px}
.sec-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.leaders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-bottom:14px}
.lcard{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;background:var(--bg)}
.lname{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;margin-bottom:9px}
.avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;font-family:'DM Mono',monospace}
.steps{display:flex;gap:5px}
.sbtn{font-family:'DM Sans',sans-serif;flex:1;font-size:11px;padding:5px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;background:transparent;color:var(--muted);transition:all .15s;font-weight:500}
.sbtn:hover{border-color:#999;color:var(--text)}
.sbtn.s-conf{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border)}
.sbtn.s-aprov{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border)}
.sbtn.s-next{background:var(--text);color:#fff;border-color:var(--text)}
.sbtn-reset{flex:0 0 auto!important;padding:5px 7px!important}
.obs-input{width:100%;font-size:12px;padding:7px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);resize:none;font-family:'DM Sans',sans-serif;outline:none;margin-top:8px}
.obs-input:focus{border-color:#999}
.ts{font-size:10px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
.card-actions{display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border);padding-top:12px}
.empty{text-align:center;padding:3rem;color:var(--muted)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.4}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:min(480px,94vw);max-height:92vh;overflow-y:auto;border:1px solid var(--border)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
.modal-title{font-size:16px;font-weight:600}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;font-size:13px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.form-input:focus{border-color:#999}
.palette-row{display:flex;gap:8px;flex-wrap:wrap}
.pdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;outline:none}
.pdot.sel{transform:scale(1.2);border-color:var(--text)!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:'DM Sans',sans-serif}
.toast.show{opacity:1}
footer{text-align:center;margin-top:2.5rem;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-receipt-tax"></i></div>
      <div class="logo-text">
        <h1>Conferência de Impostos</h1>
        <p id="subDate">Carregando...</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openAdd()"><i class="ti ti-plus"></i> Novo lançamento</button>
      <button class="btn btn-dark" onclick="doExport()"><i class="ti ti-download"></i> Exportar CSV</button>
    </div>
  </header>

  <div class="summary" id="sumGrid"></div>
  <div class="tabs" id="tabsWrap"></div>
  <div class="filters">
    <select id="fStatus" onchange="render()">
      <option value="">Todos os status</option>
      <option value="pendente">Pendentes</option>
      <option value="parcial">Em andamento</option>
      <option value="aprovado">Aprovados</option>
      <option value="vencido">Vencidos</option>
    </select>
    <input id="fSearch" placeholder="Buscar imposto..." oninput="render()" style="width:160px">
  </div>
  <div id="main"></div>

  <div class="modal-bg" id="modal">
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title" id="modalTitle">Novo lançamento</span>
        <button class="btn" onclick="closeModal()" style="padding:5px 9px"><i class="ti ti-x"></i></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <footer>Painel de Conferência de Impostos — dados salvos localmente neste navegador</footer>
</div>

<script>
const LEADERS = ['Gabi','Guilherme','Fernanda','Lauanny','Jessica Driely','Gabryel'];
const PALETTE = [
  {bg:'#EEEDFE',text:'#3C3489',dot:'#7F77DD'},
  {bg:'#E1F5EE',text:'#085041',dot:'#1D9E75'},
  {bg:'#E6F1FB',text:'#0C447C',dot:'#378ADD'},
  {bg:'#FAECE7',text:'#712B13',dot:'#D85A30'},
  {bg:'#FAEEDA',text:'#633806',dot:'#BA7517'},
  {bg:'#FBEAF0',text:'#72243E',dot:'#D4537E'},
  {bg:'#EAF3DE',text:'#27500A',dot:'#639922'},
  {bg:'#F1EFE8',text:'#5F5E5A',dot:'#888780'},
];
const AVCOLORS=[['#EEEDFE','#3C3489'],['#E1F5EE','#085041'],['#E6F1FB','#0C447C'],['#FAECE7','#712B13'],['#FAEEDA','#633806'],['#FBEAF0','#72243E']];

let S = {obligations:[], leaders:[...LEADERS], activeTab:'all', openCards:{}};
const KEY = 'tax_panel_v1';

function load(){
  try{const d=localStorage.getItem(KEY);if(d) S={...S,...JSON.parse(d)};}catch(e){}
  if(!S.leaders||!S.leaders.length) S.leaders=[...LEADERS];
  render(); updateDate();
}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}
}

function updateDate(){
  const el=document.getElementById('subDate');
  if(el) el.textContent='Atualizado em '+new Date().toLocaleString('pt-BR');
}

function initials(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function avStyle(i){const c=AVCOLORS[i%AVCOLORS.length];return `background:${c[0]};color:${c[1]}`;}

function status(ob){
  const ls=ob.ls||{};const l=S.leaders;
  if(!l.length)return 'pendente';
  if(l.every(x=>ls[x]==='aprovado'))return 'aprovado';
  if(l.some(x=>ls[x]==='conferido'||ls[x]==='aprovado'))return 'parcial';
  return 'pendente';
}

function isOverdue(ob){
  return new Date(ob.due+'T00:00:00')<new Date()&&status(ob)!=='aprovado';
}

function progress(ob){
  const ls=ob.ls||{};const total=S.leaders.length*2;
  if(!total)return 0;
  let sc=0;S.leaders.forEach(l=>{if(ls[l]==='conferido')sc+=1;if(ls[l]==='aprovado')sc+=2;});
  return Math.round(sc/total*100);
}

function getMonths(){
  const ms=new Set();S.obligations.forEach(o=>ms.add(o.due.substring(0,7)));return[...ms].sort();
}

function fmtDate(d){const[y,m,day]=d.split('-');return `${day}/${m}/${y}`;}
function fmtMonth(ym){const[y,m]=ym.split('-');return new Date(y,m-1,1).toLocaleString('pt-BR',{month:'long',year:'numeric'});}

function render(){renderSum();renderTabs();renderCards();}

function renderSum(){
  const obs=S.obligations;
  const total=obs.length,done=obs.filter(o=>status(o)==='aprovado').length;
  const part=obs.filter(o=>status(o)==='parcial').length;
  const pend=obs.filter(o=>status(o)==='pendente').length;
  const ovd=obs.filter(o=>isOverdue(o)).length;
  document.getElementById('sumGrid').innerHTML=`
    <div class="sum-card"><div class="sum-num">${total}</div><div class="sum-lbl">Total</div></div>
    <div class="sum-card"><div class="sum-num green">${done}</div><div class="sum-lbl">Aprovados</div></div>
    <div class="sum-card"><div class="sum-num amber">${part}</div><div class="sum-lbl">Em andamento</div></div>
    <div class="sum-card"><div class="sum-num muted">${pend}</div><div class="sum-lbl">Pendentes</div></div>
    <div class="sum-card"><div class="sum-num red">${ovd}</div><div class="sum-lbl">Vencidos</div></div>
  `;
}

function renderTabs(){
  const months=getMonths();
  const tabs=[{id:'all',label:'Todos'},...months.map(m=>({id:m,label:fmtMonth(m)}))];
  if(!tabs.find(t=>t.id===S.activeTab)) S.activeTab='all';
  document.getElementById('tabsWrap').innerHTML=tabs.map(t=>`<button class="tab${S.activeTab===t.id?' active':''}" onclick="setTab('${t.id}')">${t.label}</button>`).join('');
}

function setTab(id){S.activeTab=id;render();}

function renderCards(){
  const sf=document.getElementById('fStatus')?.value||'';
  const sq=(document.getElementById('fSearch')?.value||'').toLowerCase();
  let obs=[...S.obligations];
  if(S.activeTab!=='all') obs=obs.filter(o=>o.due.startsWith(S.activeTab));
  if(sf==='vencido') obs=obs.filter(o=>isOverdue(o));
  else if(sf) obs=obs.filter(o=>status(o)===sf);
  if(sq) obs=obs.filter(o=>o.name.toLowerCase().includes(sq));
  obs.sort((a,b)=>a.due.localeCompare(b.due));
  if(!obs.length){
    document.getElementById('main').innerHTML=`<div class="empty"><i class="ti ti-clipboard-list"></i>Nenhum lançamento cadastrado.<br><br><button class="btn btn-dark" onclick="openAdd()" style="margin-top:12px"><i class="ti ti-plus"></i> Adicionar primeiro lançamento</button></div>`;
    return;
  }
  document.getElementById('main').innerHTML=obs.map(o=>cardHtml(o)).join('');
}

function cardHtml(ob){
  const st=status(ob);const prog=progress(ob);const ovd=isOverdue(ob);
  const open=S.openCards[ob.id];
  const pi=ob.paletteIdx??0;const p=PALETTE[pi%PALETTE.length];
  let badge='';
  if(ovd) badge='<span class="badge b-red">Vencido</span>';
  else if(st==='aprovado') badge='<span class="badge b-green">Aprovado</span>';
  else if(st==='parcial') badge='<span class="badge b-amber">Em andamento</span>';
  else badge='<span class="badge b-gray">Pendente</span>';
  const pc=prog===100?'#27500A':prog>40?'#633806':'#791F1F';
  const leadersHtml=S.leaders.map((l,li)=>{
    const lst=ob.ls?.[l]||'pendente';const obsT=ob.obs?.[l]||'';const ts=ob.ts?.[l]||'';
    const isConf=lst==='conferido'||lst==='aprovado';const isAprov=lst==='aprovado';
    return `<div class="lcard">
      <div class="lname">
        <div class="avatar" style="${avStyle(li)}">${initials(l)}</div>
        <span>${l}</span>
        ${isAprov?'<i class="ti ti-circle-check" style="color:#27500A;margin-left:auto;font-size:15px"></i>':''}
        ${lst==='conferido'?'<i class="ti ti-eye-check" style="color:#633806;margin-left:auto;font-size:15px"></i>':''}
      </div>
      <div class="steps">
        <button class="sbtn ${isConf?'s-conf':''} ${lst==='pendente'?'s-next':''}" onclick="setStep('${ob.id}','${l}','conferido')">
          <i class="ti ti-eye"></i> Conferiu
        </button>
        <button class="sbtn ${isAprov?'s-aprov':''} ${lst==='conferido'?'s-next':''}" onclick="setStep('${ob.id}','${l}','aprovado')">
          <i class="ti ti-check"></i> Aprovou
        </button>
        <button class="sbtn sbtn-reset" onclick="resetStep('${ob.id}','${l}')" title="Resetar">
          <i class="ti ti-rotate-clockwise-2"></i>
        </button>
      </div>
      <textarea class="obs-input" rows="2" placeholder="Observação..." onblur="saveObs('${ob.id}','${l}',this.value)">${obsT}</textarea>
      ${ts?`<div class="ts"><i class="ti ti-clock" style="font-size:10px"></i> ${ts}</div>`:''}
    </div>`;
  }).join('');

  return `<div class="card" id="c-${ob.id}">
    <div class="card-header" onclick="toggleCard('${ob.id}')">
      <div class="card-left">
        <div class="card-dot" style="background:${p.dot}"></div>
        <div class="card-info">
          <div class="card-name">${ob.name} ${badge}</div>
          <div class="card-meta"><i class="ti ti-calendar" style="font-size:11px"></i> Vencimento: ${fmtDate(ob.due)}</div>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:${pc}"></div></div>
        <span class="prog-lbl">${prog}%</span>
        <i class="ti ti-chevron-down chevron ${open?'open':''}"></i>
      </div>
    </div>
    ${open?`<div class="card-body">
      <div class="sec-label">Líderes responsáveis</div>
      <div class="leaders-grid">${leadersHtml}</div>
      <div class="card-actions">
        <button class="btn" style="color:#791F1F;border-color:#F09595" onclick="delOb('${ob.id}')"><i class="ti ti-trash"></i> Remover</button>
        <button class="btn" onclick="openEdit('${ob.id}')"><i class="ti ti-edit"></i> Editar</button>
      </div>
    </div>`:''}
  </div>`;
}

function toggleCard(id){S.openCards[id]=!S.openCards[id];render();}

function setStep(id,l,step){
  const ob=S.obligations.find(o=>o.id===id);if(!ob)return;
  if(!ob.ls)ob.ls={};if(!ob.ts)ob.ts={};
  ob.ls[l]=step;
  ob.ts[l]=new Date().toLocaleString('pt-BR')+(step==='aprovado'?' — Aprovado':' — Conferido');
  save();showToast(`${l}: ${step==='aprovado'?'Aprovado ✓':'Conferido'}`);render();
}

function resetStep(id,l){
  const ob=S.obligations.find(o=>o.id===id);if(!ob)return;
  if(ob.ls)delete ob.ls[l];if(ob.ts)delete ob.ts[l];
  save();render();
}

function saveObs(id,l,val){
  const ob=S.obligations.find(o=>o.id===id);if(!ob)return;
  if(!ob.obs)ob.obs={};ob.obs[l]=val;save();
}

function delOb(id){
  if(!confirm('Remover este lançamento?'))return;
  S.obligations=S.obligations.filter(o=>o.id!==id);
  save();render();showToast('Lançamento removido.');
}

let selP=0;

function openAdd(){
  selP=S.obligations.length%PALETTE.length;
  document.getElementById('modalTitle').textContent='Novo lançamento';
  document.getElementById('modalBody').innerHTML=`
    <div class="form-group">
      <label class="form-label">Imposto / Obrigação</label>
      <input id="fName" class="form-input" placeholder="Ex: DARF, ISS, ICMS, Simples Nacional...">
    </div>
    <div class="form-group">
      <label class="form-label">Data de vencimento</label>
      <input type="date" id="fDue" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Cor de identificação</label>
      <div class="palette-row" id="pp">${PALETTE.map((p,i)=>`<div class="pdot${i===selP?' sel':''}" style="background:${p.dot}" onclick="pickP(${i})" title="Cor ${i+1}"></div>`).join('')}</div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:18px">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-dark" onclick="addOb()"><i class="ti ti-plus"></i> Adicionar</button>
    </div>
  `;
  document.getElementById('fDue').value=new Date().toISOString().split('T')[0];
  openModal();
}

function pickP(i){
  selP=i;
  document.querySelectorAll('.pdot').forEach((d,idx)=>d.classList.toggle('sel',idx===i));
}

function addOb(){
  const name=(document.getElementById('fName').value||'').trim();
  const due=document.getElementById('fDue').value;
  if(!name){showToast('Informe o nome do imposto');return;}
  if(!due){showToast('Informe a data de vencimento');return;}
  S.obligations.push({id:Date.now().toString(),name,due,paletteIdx:selP,ls:{},obs:{},ts:{}});
  save();closeModal();render();showToast(`"${name}" adicionado!`);
}

function openEdit(id){
  const ob=S.obligations.find(o=>o.id===id);if(!ob)return;
  selP=ob.paletteIdx??0;
  document.getElementById('modalTitle').textContent='Editar lançamento';
  document.getElementById('modalBody').innerHTML=`
    <div class="form-group">
      <label class="form-label">Imposto / Obrigação</label>
      <input id="eName" class="form-input" value="${ob.name}">
    </div>
    <div class="form-group">
      <label class="form-label">Data de vencimento</label>
      <input type="date" id="eDue" class="form-input" value="${ob.due}">
    </div>
    <div class="form-group">
      <label class="form-label">Cor de identificação</label>
      <div class="palette-row" id="pp">${PALETTE.map((p,i)=>`<div class="pdot${i===selP?' sel':''}" style="background:${p.dot}" onclick="pickP(${i})"></div>`).join('')}</div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:18px">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-dark" onclick="saveEdit('${id}')"><i class="ti ti-check"></i> Salvar</button>
    </div>
  `;
  openModal();
}

function saveEdit(id){
  const ob=S.obligations.find(o=>o.id===id);if(!ob)return;
  const name=(document.getElementById('eName').value||'').trim();
  const due=document.getElementById('eDue').value;
  if(!name||!due){showToast('Preencha todos os campos');return;}
  ob.name=name;ob.due=due;ob.paletteIdx=selP;
  save();closeModal();render();showToast('Salvo com sucesso!');
}

function doExport(){
  if(!S.obligations.length){showToast('Nenhum dado para exportar');return;}
  const rows=[['Imposto','Vencimento','Status','Progresso',...S.leaders]];
  S.obligations.forEach(ob=>{
    rows.push([ob.name,ob.due,status(ob),progress(ob)+'%',...S.leaders.map(l=>ob.ls?.[l]||'pendente')]);
  });
  const bom='\uFEFF';
  const csv=bom+rows.map(r=>r.map(c=>`"${c}"`).join(';')).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='conferencia_impostos.csv';a.click();
  showToast('CSV exportado!');
}

function openModal(){document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

load();
</script>
</body>
</html>
